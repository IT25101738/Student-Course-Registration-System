<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Faculty - UniPortal</title>

    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #f8f9fa;
        }

        .sidebar {
            width: 250px;
            background-color: #212529;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #343a40;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .sidebar-menu li {
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.3s;
            color: #adb5bd;
        }

        .sidebar-menu li:hover {
            background-color: #343a40;
            color: white;
        }

        .sidebar-menu li.active {
            background-color: #343a40;
            color: white;
            border-left: 4px solid #007bff;
        }

        .main-content {
            flex-grow: 1;
            padding: 40px;
        }

        .form-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .update-btn {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

    </style>

</head>
<body>

<div class="sidebar">

    <div class="sidebar-header">
        UniPortal
    </div>

    <ul class="sidebar-menu">

        <li onclick="window.location.href='faculty-register.html'">
            Faculty Registration
        </li>

        <li onclick="window.location.href='faculty-list.html'">
            Faculty List
        </li>

        <li class="active">
            Update Faculty
        </li>

    </ul>

</div>

<div class="main-content">

    <div class="form-card">

        <h2>Update Faculty</h2>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
        </div>

        <div class="form-group">
            <label>Department</label>
            <input type="text" id="department">
        </div>

        <div class="form-group">
            <label>Specialization</label>
            <input type="text" id="specialization">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phoneNumber">
        </div>

        <button class="update-btn" onclick="updateFaculty()">
            Update Faculty
        </button>

    </div>

</div>

<script>

    const urlParams = new URLSearchParams(window.location.search);

    const facultyId = urlParams.get("id");

    async function loadFaculty() {

        const response = await fetch(
            `http://localhost:8080/api/faculty/all`
        );

        const facultyList = await response.json();

        const faculty = facultyList.find(f =>
            f.facultyId == facultyId
        );

        document.getElementById("fullName").value =
            faculty.fullName;

        document.getElementById("email").value =
            faculty.email;

        document.getElementById("department").value =
            faculty.department;

        document.getElementById("specialization").value =
            faculty.specialization;

        document.getElementById("phoneNumber").value =
            faculty.phoneNumber;
    }

    async function updateFaculty() {

        const updatedFaculty = {

            fullName: document.getElementById("fullName").value,
            email: document.getElementById("email").value,
            department: document.getElementById("department").value,
            specialization: document.getElementById("specialization").value,
            phoneNumber: document.getElementById("phoneNumber").value

        };

        const response = await fetch(

            `http://localhost:8080/api/faculty/update/${facultyId}`,

            {
                method: "PUT",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(updatedFaculty)
            }
        );

        if(response.ok) {

            alert("Faculty Updated Successfully!");

            window.location.href =
                "faculty-list.html";

        } else {

            alert("Error Updating Faculty");

        }
    }

    loadFaculty();

</script>

</body>
</html>
