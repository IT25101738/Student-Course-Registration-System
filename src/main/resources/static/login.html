<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; margin-top: 0; margin-bottom: 20px; color: #333; }
        label { font-weight: bold; color: #555; font-size: 14px; display: block; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0 0 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0, 123, 255, 0.3); }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 25px; transition: background-color 0.3s; }
        button:hover { background-color: #0056b3; }
        .register-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .register-link a { color: #28a745; text-decoration: none; font-weight: bold; }
        .register-link a:hover { text-decoration: underline; }
        #statusMessage { text-align: center; font-weight: bold; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="form-box">
    <h2>Student Login</h2>

    <label>Email Address:</label>
    <input type="email" id="loginEmail" placeholder="Enter your email">

    <label>Password:</label>
    <input type="password" id="loginPassword" placeholder="Enter your password">

    <button onclick="loginStudent()">Login</button>

    <p id="statusMessage"></p>

    <div class="register-link">
        Don't have an account? <a href="register.html">Register here</a>
    </div>
</div>

<script>
    function loginStudent() {
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        const statusMessage = document.getElementById("statusMessage");

        if (!email || !password) {
            statusMessage.style.color = "#dc3545";
            statusMessage.innerText = "Please fill in all fields.";
            return;
        }

        statusMessage.innerText = "Logging in...";
        statusMessage.style.color = "#555";

        fetch('http://localhost:8080/api/students/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        })
        .then(response => {
            if(response.ok) {
                return response.json(); // Get the student data back from Java
            } else {
                throw new Error("Invalid credentials");
            }
        })
        .then(studentData => {
            // Save their name in the browser so the dashboard knows who they are
            sessionStorage.setItem("loggedInStudentName", studentData.name);
            sessionStorage.setItem("loggedInStudentMajor", studentData.major);

            // Teleport them to the Dashboard!
            window.location.href = "dashboard.html";
        })
        .catch(error => {
            statusMessage.style.color = "#dc3545";
            statusMessage.innerText = "Error: Invalid email or password.";
        });
    }
</script>

</body>
</html>
