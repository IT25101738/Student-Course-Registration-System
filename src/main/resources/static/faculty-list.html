<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty List - UniPortal</title>

    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #f8f9fa;
        }

        /* SIDEBAR */

        .sidebar {
            width: 250px;
            background-color: #212529;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #343a40;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .sidebar-menu li {
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.3s;
            color: #adb5bd;
        }

        .sidebar-menu li:hover {
            background-color: #343a40;
            color: white;
        }

        .sidebar-menu li.active {
            background-color: #343a40;
            color: white;
            border-left: 4px solid #007bff;
        }

        .logout-btn {
            padding: 15px 20px;
            color: #dc3545;
            cursor: pointer;
            border-top: 1px solid #343a40;
        }

        .logout-btn:hover {
            background-color: #343a40;
        }

        /* MAIN CONTENT */

        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-row h1 {
            margin: 0;
            color: #333;
        }

        .badge {
            background-color: #007bff;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        /* TABLE CARD */

        .table-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e9ecef;
        }

        .table-card h3 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background-color: #007bff;
            color: white;
            padding: 12px;
            text-align: left;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
        }

        table tr:hover {
            background-color: #f1f3f5;
        }

    </style>

</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="sidebar-header">
        UniPortal
    </div>

    <ul class="sidebar-menu">

        <li onclick="window.location.href='dashboard.html'">
            Dashboard
        </li>

        <li onclick="window.location.href='faculty-register.html'">
            Faculty Registration
        </li>

        <li class="active">
            Faculty List
        </li>

        <li onclick="window.location.href='profile.html'">
            Profile
        </li>

    </ul>

    <div class="logout-btn" onclick="logout()">
        Logout
    </div>

</div>

<!-- MAIN CONTENT -->

<div class="main-content">

    <div class="header-row">

        <h1>Faculty List 👨‍🏫</h1>

        <div class="badge">
            Spring 2026 / Faculty Module
        </div>

    </div>

    <!-- TABLE CARD -->

    <div class="table-card">

        <h3>Registered Faculty Members</h3>

        <table>

            <thead>

            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Specialization</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody id="facultyTableBody">

            </tbody>

        </table>

    </div>

</div>

<script>

    async function loadFaculty() {

        const response = await fetch("http://localhost:8080/api/faculty/all");

        const facultyList = await response.json();

        const tableBody = document.getElementById("facultyTableBody");

        tableBody.innerHTML = "";

        facultyList.forEach(faculty => {

            tableBody.innerHTML += `

<tr>
    <td>${faculty.facultyId}</td>
    <td>${faculty.fullName}</td>
    <td>${faculty.email}</td>
    <td>${faculty.department}</td>
    <td>${faculty.specialization}</td>
    <td>${faculty.phoneNumber}</td>

    <td>

    <button onclick="editFaculty(${faculty.facultyId})"
            style="
                background-color:#007bff;
                color:white;
                border:none;
                padding:8px 12px;
                border-radius:5px;
                cursor:pointer;
                margin-right:5px;
            ">
        Edit
    </button>

    <button onclick="deleteFaculty(${faculty.facultyId})"
            style="
                background-color:#dc3545;
                color:white;
                border:none;
                padding:8px 12px;
                border-radius:5px;
                cursor:pointer;
            ">
        Delete
    </button>

    </td>
</tr>

`;
        });

    }

    loadFaculty();

    async function deleteFaculty(id) {

        const response = await fetch(
            `http://localhost:8080/api/faculty/delete/${id}`,
            {
                method: "DELETE"
            }
        );

        if(response.ok) {

            alert("Faculty Deleted Successfully!");

            loadFaculty();

        } else {

            alert("Error Deleting Faculty");
        }
    }

    function editFaculty(id) {

        window.location.href =
            `faculty-update.html?id=${id}`;

    }

    function logout() {

        sessionStorage.clear();
        window.location.href = "login.html";

    }

</script>

</body>
</html>
