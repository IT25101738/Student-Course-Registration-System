<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    <style>
        /* Professional, centered layout */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
        }
        h2 { text-align: center; margin-top: 0; margin-bottom: 20px; color: #333; }
        label { font-weight: bold; color: #555; font-size: 14px; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 0 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { border-color: #28a745; outline: none; box-shadow: 0 0 5px rgba(40, 167, 69, 0.3); }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 25px; transition: background-color 0.3s; }
        button:hover { background-color: #218838; }
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .login-link a { color: #007bff; text-decoration: none; font-weight: bold; }
        .login-link a:hover { text-decoration: underline; }
        #statusMessage { text-align: center; font-weight: bold; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="form-box">
    <h2>Register as a New Student</h2>

    <label>Student Level:</label>
    <select id="studentType" onchange="updateDynamicField()">
        <option value="UNDERGRAD">Undergraduate Student</option>
        <option value="GRAD">Graduate Student</option>
    </select>

    <label>Full Name:</label>
    <input type="text" id="studentName" placeholder="Enter your name">

    <label>Email Address:</label>
    <input type="email" id="studentEmail" placeholder="Enter your email">

    <label>Date of Birth:</label>
    <input type="date" id="studentDob">

    <label>Contact Number:</label>
    <input type="text" id="studentContact" placeholder="Enter phone number">

    <label>Home Address:</label>
    <input type="text" id="studentAddress" placeholder="Enter your home address">
    <label>Major:</label>
    <select id="studentMajor">
        <option value="Software Engineering">Software Engineering</option>
        <option value="Computer Science">Computer Science</option>
        <option value="Data Science">Data Science</option>
        <option value="Information Technology">Information Technology</option>
        <option value="Cyber Security">Cyber Security</option>
    </select>

    <label id="dynamicLabel">High School Name:</label>
    <input type="text" id="dynamicInput" placeholder="Enter high school name">

    <label>Password:</label>
    <input type="password" id="studentPassword" placeholder="Create a password">

    <button onclick="registerStudent()">Register</button>

    <p id="statusMessage"></p>

    <div class="login-link">
        Already have an account? <a href="login.html">Log in here</a>
    </div>
</div>

<script>
    function updateDynamicField() {
        const type = document.getElementById("studentType").value;
        const label = document.getElementById("dynamicLabel");
        const input = document.getElementById("dynamicInput");

        if (type === "UNDERGRAD") {
            label.innerText = "High School Name:";
            input.placeholder = "Enter high school name";
        } else {
            label.innerText = "Research Thesis Title:";
            input.placeholder = "Enter thesis title";
        }
    }

    function registerStudent() {
        const type = document.getElementById("studentType").value;
        const name = document.getElementById("studentName").value;
        const email = document.getElementById("studentEmail").value;
        const major = document.getElementById("studentMajor").value;
        const dynamicData = document.getElementById("dynamicInput").value;
        const password = document.getElementById("studentPassword").value;

        // NEW: Grab the extra data
        const dob = document.getElementById("studentDob").value;
        const contact = document.getElementById("studentContact").value;
        const address = document.getElementById("studentAddress").value;

        const statusMessage = document.getElementById("statusMessage");

        if (!name || !email || !major || !password || !dynamicData) {
            statusMessage.style.color = "#dc3545";
            statusMessage.innerText = "Please fill in all required fields.";
            return;
        }

        statusMessage.innerText = "Registering...";
        statusMessage.style.color = "#555";

        // NEW: Add the extra fields to the payload
        const studentData = {
            type: type,
            name: name,
            email: email,
            major: major,
            extraInfo: dynamicData,
            password: password,
            birthday: dob,
            contactNumber: contact,
            address: address
        };

        fetch('http://localhost:8080/api/students/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(studentData)
        })
        .then(response => {
            if(response.ok) {
                window.location.href = "login.html";
            } else {
                statusMessage.style.color = "#dc3545";
                statusMessage.innerText = "Error: Could not register. Email might already exist.";
            }
        })
        .catch(error => {
            console.error('Error:', error);
            statusMessage.style.color = "#dc3545";
            statusMessage.innerText = "Network Error. Is your Java server running?";
        });
    }
</script>

</body>
</html>
